workflows:
  ios-release:
    name: Wayfare iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_asc # must match the integration name you set in Codemagic > Team settings > Integrations > App Store Connect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.harnoorbrar.wayfare
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -maxdepth 3 -execdir pod install \;
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build ipa for App Store distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $CM_EXPORT_DIR/*.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
