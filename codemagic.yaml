workflows:
  ios-release:
    name: Wayfare iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_asc # must match the integration name you set in Codemagic > Team settings > Integrations > App Store Connect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.harnoorbrar.wayfare
      vars:
        # Capacitor 8 uses Swift Package Manager, not CocoaPods, so there is NO
        # top-level App.xcworkspace -- build against the .xcodeproj directly.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          # Offset by 6: builds 1-6 were uploaded to App Store Connect before
          # this Codemagic pipeline existed, and its BUILD_NUMBER counter
          # starts at 1. Upload fails unless the build number exceeds 6.
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 6))
      - name: Build ipa for App Store distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $CM_EXPORT_DIR/*.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Set submit_to_app_store true to auto-submit for review after upload. It
        # only succeeds if the app record + listing metadata (screenshots,
        # description, age rating, privacy answers) are complete in App Store
        # Connect; otherwise the build still uploads and you submit manually.
        submit_to_app_store: true
