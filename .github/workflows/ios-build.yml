name: iOS Build & TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Prepare signing
        id: signing
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          echo "signing_ready=false" >> "$GITHUB_OUTPUT"
          echo "upload_ready=false" >> "$GITHUB_OUTPUT"

          required_secrets=(CERT_P12_BASE64 CERT_PASSWORD PROVISIONING_PROFILE_BASE64 APPLE_TEAM_ID)
          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "::warning::Missing required signing secret: $secret_name. Falling back to unsigned simulator build."
              exit 0
            fi
          done

          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12 || {
            echo "::warning::Unable to decode CERT_P12_BASE64. Falling back to unsigned simulator build."
            exit 0
          }

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          if ! security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign; then
            echo "::warning::Failed to import signing certificate (possible bad CERT_PASSWORD). Falling back to unsigned simulator build."
            exit 0
          fi
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/wayfare.mobileprovision
          echo "signing_ready=true" >> "$GITHUB_OUTPUT"

          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER_ID" ] && [ -n "$ASC_KEY_BASE64" ]; then
            echo "upload_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Missing TestFlight API key secrets. Build will run, but upload will be skipped."
            echo "upload_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build archive
        if: steps.signing.outputs.signing_ready == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/Wayfare.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Wayfare App Store" \
            archive

      - name: Export IPA
        if: steps.signing.outputs.signing_ready == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" ios/exportOptions.plist || \
            /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" ios/exportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/Wayfare.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/exportOptions.plist

      - name: Upload to TestFlight
        if: steps.signing.outputs.upload_ready == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8
          xcrun altool --upload-app -f build/ipa/App.ipa -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Build unsigned simulator app
        if: steps.signing.outputs.signing_ready != 'true'
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            build
