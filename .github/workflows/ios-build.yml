name: iOS Build & TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Configure signing mode
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          SIGNING_READY=true
          HAS_UPLOAD_SECRETS=true
          missing_signing=()

          [ -z "$CERT_P12_BASE64" ] && missing_signing+=("CERT_P12_BASE64")
          [ -z "$CERT_PASSWORD" ] && missing_signing+=("CERT_PASSWORD")
          [ -z "$PROVISIONING_PROFILE_BASE64" ] && missing_signing+=("PROVISIONING_PROFILE_BASE64")
          [ -z "$APPLE_TEAM_ID" ] && missing_signing+=("APPLE_TEAM_ID")

          if [ "${#missing_signing[@]}" -gt 0 ]; then
            echo "Required signing secrets are missing (${missing_signing[*]}); switching to unsigned simulator build."
            SIGNING_READY=false
          fi

          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_KEY_BASE64" ]; then
            HAS_UPLOAD_SECRETS=false
          fi

          echo "SIGNING_READY=$SIGNING_READY" >> "$GITHUB_ENV"
          echo "HAS_UPLOAD_SECRETS=$HAS_UPLOAD_SECRETS" >> "$GITHUB_ENV"

      - name: Import signing certificate
        if: env.SIGNING_READY == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # Keep going on import errors so we can switch to the unsigned fallback path.
          set +e
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          import_status=$?
          if [ "$import_status" -ne 0 ]; then
            echo "Certificate import failed; switching to unsigned simulator build."
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        if: env.SIGNING_READY == 'true'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/wayfare.mobileprovision

      - name: Build archive
        if: env.SIGNING_READY == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/Wayfare.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Wayfare App Store" \
            archive

      - name: Build simulator app (unsigned fallback)
        if: env.SIGNING_READY != 'true'
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Export IPA
        if: env.SIGNING_READY == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" ios/exportOptions.plist || \
            /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" ios/exportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/Wayfare.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/exportOptions.plist

      - name: Upload to TestFlight
        if: env.SIGNING_READY == 'true' && env.HAS_UPLOAD_SECRETS == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8
          xcrun altool --upload-app -f build/ipa/App.ipa -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
